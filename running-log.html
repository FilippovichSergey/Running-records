<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sergey's Running Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #e8521b;
  --bg: #f0ede8;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #888;
  --border: #e5e1da;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: #1a1a1a;
  color: #fff;
  height: 60px;
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 28px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.4px;
  white-space: nowrap;
}
.logo em { color: var(--accent); font-style: normal; }

nav { display: flex; gap: 4px; }

nav button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.55);
  padding: 6px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1px;
  transition: all 0.15s;
}
nav button:hover:not(.active) { background: rgba(255,255,255,0.08); color: #fff; }
nav button.active { background: var(--accent); color: #fff; }

/* ── Lang switcher ── */
.lang-switch {
  margin-left: auto;
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 3px;
}
.lang-switch button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.45);
  padding: 4px 11px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.lang-switch button:hover:not(.active) { color: #fff; }
.lang-switch button.active { background: var(--accent); color: #fff; }

/* ── Pages ── */
.page { display: none; max-width: 880px; margin: 0 auto; padding: 32px 24px 64px; }
.page.visible { display: block; }

/* ── Run card ── */
.run-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  overflow: hidden;
}

.run-top {
  padding: 20px 24px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  cursor: pointer;
  user-select: none;
}
.run-top:hover { background: #fafaf8; }

.run-meta { flex: 1 1 auto; }

.run-when {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.run-location {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.4px;
  line-height: 1.1;
}

.run-dist {
  font-size: 34px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -1.5px;
  line-height: 1;
  white-space: nowrap;
  flex-shrink: 0;
}
.run-dist small {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0;
}

/* Stats row */
.run-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border);
}
.stat {
  padding: 13px 18px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.stat:last-child { border-right: none; }

.stat-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 3px;
}
.stat-value {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.stat-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}

/* Expand toggle */
.expand-row {
  border-top: 1px solid var(--border);
  padding: 0 24px;
  background: #fafaf8;
}
.expand-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 10px 0;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.4px;
  color: var(--accent);
  cursor: pointer;
  text-transform: uppercase;
}

/* Details panel */
.run-details {
  display: none;
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  background: #fafaf8;
}
.run-details.open { display: block; }

.details-row {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 14px;
  line-height: 1.4;
}
.details-key {
  color: var(--muted);
  font-weight: 600;
  min-width: 88px;
  flex-shrink: 0;
}

/* Photos */
.photos-wrap { margin-top: 18px; }
.photos-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.photos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.photo-thumb {
  aspect-ratio: 1;
  border-radius: 10px;
  overflow: hidden;
  background: var(--border);
  cursor: pointer;
}
.photo-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}
.photo-thumb:hover img { transform: scale(1.05); }
.no-photos {
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
}

/* ── Personal Bests page ── */
.pb-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  overflow: hidden;
}

.pb-head {
  background: #1a1a1a;
  color: #fff;
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pb-dist-name {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.pb-time {
  font-size: 34px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -1.5px;
}

.pb-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--border);
}
.pb-stat {
  padding: 14px 20px;
  border-right: 1px solid var(--border);
}
.pb-stat:last-child { border-right: none; }

.pb-photos { padding: 16px 24px; border-bottom: 1px solid var(--border); }

/* History */
.pb-history { padding: 16px 24px; }
.history-head {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.history-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.history-row:last-child { border-bottom: none; }
.history-time {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  min-width: 70px;
}
.history-date { color: var(--muted); }
.history-loc { margin-left: auto; color: var(--muted); font-size: 13px; }

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 92vw;
  max-height: 92vh;
  object-fit: contain;
  border-radius: 10px;
}
#lb-close {
  position: fixed;
  top: 18px; right: 22px;
  background: none; border: none;
  color: rgba(255,255,255,0.75);
  font-size: 38px; line-height: 1;
  cursor: pointer;
  transition: color 0.1s;
}
#lb-close:hover { color: #fff; }

/* ── Filter bar ── */
.filter-bar {
  max-width: 880px;
  margin: 24px auto 0;
  padding: 0 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.filter-bar select,
.filter-bar input[type="text"] {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  padding: 5px 10px;
  outline: none;
  transition: border-color 0.15s;
}
.filter-bar select:focus,
.filter-bar input[type="text"]:focus { border-color: var(--accent); }

.filter-bar input[type="text"] { width: 130px; }

#filter-reset {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
#filter-reset:hover { border-color: var(--accent); color: var(--accent); }

#runs-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  margin-left: 4px;
}

/* ── Trend chart ── */
.chart-wrap {
  max-width: 880px;
  margin: 20px auto 0;
  padding: 0 24px;
}

.chart-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 20px 24px 16px;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.chart-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1px;
  color: var(--text);
}

.chart-toggle {
  display: flex;
  gap: 4px;
}

.chart-toggle button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
}
.chart-toggle button:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.chart-toggle button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.chart-svg { width: 100%; display: block; overflow: visible; }

/* ── Responsive ── */
@media (max-width: 580px) {
  .run-stats { grid-template-columns: repeat(2, 1fr); }
  .pb-stats { grid-template-columns: repeat(2, 1fr); }
  .run-dist { font-size: 26px; }
  .pb-time { font-size: 26px; }
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo">Sergey's <em>Running</em> Log</div>
  <nav>
    <button class="active" id="nav-runs" onclick="showPage('runs', this)">All Runs</button>
    <button id="nav-pbs" onclick="showPage('pbs', this)">Personal Bests</button>
  </nav>
  <div class="lang-switch">
    <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
    <button id="lang-be" onclick="setLang('be')">BE</button>
  </div>
</header>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLb()">
  <button id="lb-close" onclick="closeLb()">×</button>
  <img id="lb-img" src="" alt="">
</div>

<div id="runs-filterbar" class="filter-bar">
  <div class="filter-group">
    <span class="filter-label" id="flabel-year"></span>
    <select id="filter-year" onchange="applyFilters()"></select>
  </div>
  <div class="filter-group">
    <span class="filter-label" id="flabel-sneaker"></span>
    <select id="filter-sneaker" onchange="applyFilters()"></select>
  </div>
  <div class="filter-group">
    <span class="filter-label" id="flabel-distance"></span>
    <select id="filter-distance" onchange="applyFilters()"></select>
  </div>
  <div class="filter-group">
    <span class="filter-label" id="flabel-search"></span>
    <input type="text" id="filter-search" oninput="applyFilters()" placeholder="…">
  </div>
  <button id="filter-reset" onclick="resetFilters()"></button>
  <span id="runs-count"></span>
</div>

<div id="page-runs" class="page visible"></div>

<div id="pbs-chart" class="chart-wrap" style="display:none">
  <div class="chart-card">
    <div class="chart-header">
      <div class="filter-group">
        <span class="filter-label" id="pbc-label-dist"></span>
        <select id="pbc-distance" onchange="renderPBChart()"></select>
      </div>
      <div class="chart-toggle">
        <button class="active" id="pbc-pace" onclick="setPBChartMetric('pace')"></button>
        <button id="pbc-time" onclick="setPBChartMetric('time')"></button>
      </div>
    </div>
    <svg class="chart-svg" id="pbc-svg" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
  </div>
</div>

<div id="page-pbs" class="page"></div>

<script src="data/data.js"></script>
<script>
// Data is loaded from data/data.js (RUNS_DATA, PBS_DATA).
// Use add_new_event.py to add or edit events — do not edit data.js manually.

const RUNS           = typeof RUNS_DATA !== "undefined" ? RUNS_DATA : [];
const PERSONAL_BESTS = typeof PBS_DATA  !== "undefined" ? PBS_DATA  : [];

// ── i18n ─────────────────────────────────────────────────────

const I18N = {
  en: {
    logo:           "Sergey's <em>Running</em> Log",
    nav_runs:       "All Runs",
    nav_pbs:        "Personal Bests",
    pace:           "Pace",
    avg_hr:         "Avg HR",
    max_hr:         "Max HR",
    sneakers:       "Sneakers",
    min_km:         "min/km",
    bpm:            "bpm",
    avg:            "avg",
    max:            "max",
    km:             "km",
    total_time:     "Total time",
    elevation:      "Elevation",
    m:              "m",
    pbc_distance:    "Distance",
    pbc_pace:        "Pace",
    pbc_time:        "Time",
    filter_year:     "Year",
    filter_sneaker:  "Sneakers",
    filter_distance: "Distance",
    filter_search:   "Location",
    filter_reset:    "Reset",
    all_years:       "All years",
    all_sneakers:    "All sneakers",
    all_distances:   "All distances",
    runs_shown:     function(n, t) { return n + ' / ' + t + ' runs'; },
    photos_details: "Photos & details",
    hide_details:   "Hide details",
    det_date:       "Date",
    det_location:   "Location",
    det_distance:   "Distance",
    det_pace:       "Pace",
    det_avg_hr:     "Avg HR",
    det_max_hr:     "Max HR",
    det_sneakers:   "Sneakers",
    photos:         "Photos",
    no_photos:      "No photos added yet.",
    date_place:     "Date & Place",
    heart_rate:     "Heart Rate",
    prev_records:   "Previous Records",
    first_time:     "This is your first recorded time for this distance.",
    locale:         "en-GB",
  },
  be: {
    logo:           "<em>Бегавы</em> дзённік Сяргея",
    nav_runs:       "Усе забегі",
    nav_pbs:        "Асабістыя рэкорды",
    pace:           "Тэмп",
    avg_hr:         "Сяр. пульс",
    max_hr:         "Макс. пульс",
    sneakers:       "Красоўкі",
    min_km:         "хв/км",
    bpm:            "уд/хв",
    avg:            "сяр.",
    max:            "макс.",
    km:             "км",
    total_time:     "Агульны час",
    elevation:      "Набор",
    m:              "м",
    pbc_distance:    "Адлегласць",
    pbc_pace:        "Тэмп",
    pbc_time:        "Час",
    filter_year:     "Год",
    filter_sneaker:  "Красоўкі",
    filter_distance: "Адлегласць",
    filter_search:   "Месца",
    filter_reset:    "Скінуць",
    all_years:       "Усе гады",
    all_sneakers:    "Усе красоўкі",
    all_distances:   "Усе адлегласці",
    runs_shown:     function(n, t) { return n + ' / ' + t + ' забегаў'; },
    photos_details: "Фота і падрабязнасці",
    hide_details:   "Схаваць падрабязнасці",
    det_date:       "Дата",
    det_location:   "Месца",
    det_distance:   "Адлегласць",
    det_pace:       "Тэмп",
    det_avg_hr:     "Сяр. пульс",
    det_max_hr:     "Макс. пульс",
    det_sneakers:   "Красоўкі",
    photos:         "Фота",
    no_photos:      "Фота пакуль не дададзены.",
    date_place:     "Дата і месца",
    heart_rate:     "Пульс",
    prev_records:   "Папярэднія рэкорды",
    first_time:     "Гэта ваш першы запісаны вынік на гэтай дыстанцыі.",
    locale:         "be",
  },
};

let LANG = localStorage.getItem('lang') || 'en';
const t = key => I18N[LANG][key];

function locStr(obj) {
  return (LANG === 'be' && obj.location_be) ? obj.location_be : obj.location;
}

// ── Helpers ───────────────────────────────────────────────────

var BE_MONTHS = [
  'студзеня','лютага','сакавіка','красавіка','траўня','чэрвеня',
  'ліпеня','жніўня','верасня','кастрычніка','лістапада','снежня'
];

function fmtDate(str) {
  var d = new Date(str + 'T12:00:00');
  if (LANG === 'be') {
    return d.getDate() + ' ' + BE_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
  }
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function calcPace(distance_km, total_time) {
  var parts = total_time.split(':').map(Number);
  var totalSec = parts.length === 3
    ? parts[0] * 3600 + parts[1] * 60 + parts[2]
    : parts[0] * 60 + parts[1];
  var paceSecPerKm = totalSec / distance_km;
  var pm = Math.floor(paceSecPerKm / 60);
  var ps = Math.round(paceSecPerKm % 60);
  if (ps === 60) { pm++; ps = 0; }
  return pm + ':' + (ps < 10 ? '0' + ps : ps);
}

function photoGrid(photos) {
  if (!photos || photos.length === 0)
    return '<p class="no-photos">' + t('no_photos') + '</p>';
  return '<div class="photos-grid">' +
    photos.map(function(src) {
      return '<div class="photo-thumb" onclick="openLb(\'' + src + '\')">' +
               '<img src="' + src + '" alt="" loading="lazy">' +
             '</div>';
    }).join('') +
  '</div>';
}

// ── PB Chart ──────────────────────────────────────────────────

var pbChartMetric = 'pace';

function setPBChartMetric(m) {
  pbChartMetric = m;
  document.getElementById('pbc-pace').classList.toggle('active', m === 'pace');
  document.getElementById('pbc-time').classList.toggle('active', m === 'time');
  renderPBChart();
}

function buildPBChartOptions() {
  document.getElementById('pbc-label-dist').textContent = t('pbc_distance');
  document.getElementById('pbc-pace').textContent       = t('pbc_pace');
  document.getElementById('pbc-time').textContent       = t('pbc_time');

  var sel    = document.getElementById('pbc-distance');
  var curVal = sel.value;
  sel.innerHTML = PERSONAL_BESTS.map(function(pb) {
    return '<option value="' + pb.distance + '">' + pb.distance + '</option>';
  }).join('');
  if (curVal && PERSONAL_BESTS.some(function(pb) { return pb.distance === curVal; }))
    sel.value = curVal;
}

function timeToSec(str) {
  var p = str.split(':').map(Number);
  return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2] : p[0]*60 + p[1];
}

function fmtSec(sec) {
  sec = Math.round(sec);
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = sec % 60;
  if (h > 0) return h + ':' + (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
  return m + ':' + (s < 10 ? '0'+s : s);
}

function renderPBChart() {
  var svg = document.getElementById('pbc-svg');
  var distName = document.getElementById('pbc-distance').value;
  var pb = PERSONAL_BESTS.find(function(p) { return p.distance === distName; });
  if (!pb) { svg.innerHTML = ''; return; }

  // Collect all data points: previous records + current PB
  var points = (pb.previous_records || []).map(function(r) {
    return { date: r.date, sec: timeToSec(r.time), loc: r.location };
  });
  points.push({ date: pb.date, sec: timeToSec(pb.total_time), loc: pb.location, isBest: true });
  points.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

  if (points.length < 2) {
    // single point — still draw it
    if (points.length === 0) { svg.innerHTML = ''; return; }
  }

  var W = 760, H = 180, ML = 52, MR = 16, MT = 14, MB = 42;
  var cW = W - ML - MR, cH = H - MT - MB;
  var n  = points.length;
  var isPace = pbChartMetric === 'pace';

  function val(pt) {
    return isPace ? pt.sec / pb.distance_km : pt.sec;
  }

  var vals = points.map(val);
  var minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  var pad  = (maxV - minV) * 0.18 || (isPace ? 10 : 30);
  minV = Math.max(0, minV - pad); maxV += pad;
  var range = maxV - minV || 1;

  function xPos(i) { return n === 1 ? ML + cW/2 : ML + (i / (n-1)) * cW; }
  // lower = better → invert: lower value → top of chart
  function yPos(v) { return MT + ((v - minV) / range) * cH; }

  function fmtVal(v) { return fmtSec(v); }

  // y-axis ticks
  var tickCount = 4, yHtml = '';
  for (var ti = 0; ti <= tickCount; ti++) {
    var tv = minV + (ti / tickCount) * range;
    var ty = yPos(tv);
    yHtml +=
      '<line x1="' + ML + '" y1="' + ty + '" x2="' + (ML+cW) + '" y2="' + ty +
        '" stroke="var(--border)" stroke-width="1"/>' +
      '<text x="' + (ML-5) + '" y="' + (ty+4) +
        '" text-anchor="end" font-size="10" font-family="inherit" fill="var(--muted)">' +
        fmtVal(tv) + '</text>';
  }

  // x-axis: label every point with short date
  var xHtml = points.map(function(pt, i) {
    var d    = new Date(pt.date + 'T12:00:00');
    var mon  = d.toLocaleDateString(t('locale'), { month: 'short' });
    var line1 = mon + ' ' + d.getDate();
    var line2 = d.getFullYear();
    var x = xPos(i);
    return '<text x="' + x + '" y="' + (MT+cH+16) +
      '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' + line1 + '</text>' +
      '<text x="' + x + '" y="' + (MT+cH+28) +
      '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' + line2 + '</text>';
  }).join('');

  // trend line
  var lineHtml = n > 1
    ? '<polyline points="' + points.map(function(pt,i){return xPos(i)+','+yPos(val(pt));}).join(' ') +
      '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>'
    : '';

  // dots — current PB gets a larger filled circle
  var dotsHtml = points.map(function(pt, i) {
    var v   = val(pt);
    var tip = fmtDate(pt.date) + ' · ' + pt.loc + '\n' + fmtVal(v) + (isPace ? ' ' + t('min_km') : '');
    var r   = pt.isBest ? 7 : 5;
    var fill = pt.isBest ? 'var(--accent)' : 'var(--card)';
    var stroke = 'var(--accent)';
    var sw = pt.isBest ? 0 : 2.5;
    return '<circle cx="' + xPos(i) + '" cy="' + yPos(v) + '" r="' + r + '"' +
      ' fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + sw + '">' +
      '<title>' + tip.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</title></circle>';
  }).join('');

  svg.innerHTML = yHtml + xHtml + lineHtml + dotsHtml;
}

// ── Filters ───────────────────────────────────────────────────

function buildFilterOptions() {
  var years     = [...new Set(RUNS.map(r => r.date.slice(0, 4)))].sort().reverse();
  var sneakers  = [...new Set(RUNS.map(r => r.sneakers).filter(Boolean))].sort();
  var distances = [...new Set(RUNS.map(r => r.distance_km))].sort((a, b) => a - b);

  var ySel = document.getElementById('filter-year');
  var sSel = document.getElementById('filter-sneaker');
  var dSel = document.getElementById('filter-distance');
  var yVal = ySel.value, sVal = sSel.value, dVal = dSel.value;

  ySel.innerHTML = '<option value="">' + t('all_years') + '</option>' +
    years.map(y => '<option value="' + y + '">' + y + '</option>').join('');
  sSel.innerHTML = '<option value="">' + t('all_sneakers') + '</option>' +
    sneakers.map(s => '<option value="' + s + '">' + s + '</option>').join('');
  dSel.innerHTML = '<option value="">' + t('all_distances') + '</option>' +
    distances.map(d => '<option value="' + d + '">' + d + ' ' + t('km') + '</option>').join('');

  if (yVal) ySel.value = yVal;
  if (sVal) sSel.value = sVal;
  if (dVal) dSel.value = dVal;

  document.getElementById('flabel-year').textContent     = t('filter_year');
  document.getElementById('flabel-sneaker').textContent  = t('filter_sneaker');
  document.getElementById('flabel-distance').textContent = t('filter_distance');
  document.getElementById('flabel-search').textContent   = t('filter_search');
  document.getElementById('filter-reset').textContent    = t('filter_reset');
}

function applyFilters() {
  var year     = document.getElementById('filter-year').value;
  var sneaker  = document.getElementById('filter-sneaker').value;
  var distance = document.getElementById('filter-distance').value;
  var search   = document.getElementById('filter-search').value.trim().toLowerCase();

  var filtered = RUNS.filter(function(r) {
    if (year     && r.date.slice(0, 4) !== year)               return false;
    if (sneaker  && r.sneakers !== sneaker)                     return false;
    if (distance && r.distance_km !== parseFloat(distance))    return false;
    if (search   && !locStr(r).toLowerCase().includes(search)) return false;
    return true;
  });

  renderRuns(filtered);
  document.getElementById('runs-count').textContent =
    (filtered.length < RUNS.length) ? t('runs_shown')(filtered.length, RUNS.length) : '';
}

function resetFilters() {
  document.getElementById('filter-year').value     = '';
  document.getElementById('filter-sneaker').value  = '';
  document.getElementById('filter-distance').value = '';
  document.getElementById('filter-search').value   = '';
  applyFilters();
}

// ── Render: All Runs ──────────────────────────────────────────

function renderRuns(runs) {
  if (!runs) runs = RUNS;
  var sorted = runs.slice().sort(function(a, b) {
    return new Date(b.date) - new Date(a.date);
  });

  document.getElementById('page-runs').innerHTML = sorted.map(function(run, i) {
    return '<article class="run-card">' +
      '<div class="run-top" onclick="toggleDetails(' + i + ')">' +
        '<div class="run-meta">' +
          '<div class="run-when">' + fmtDate(run.date) + '</div>' +
          '<div class="run-location">' + locStr(run) + '</div>' +
        '</div>' +
        '<div class="run-dist">' + run.distance_km + '<small> ' + t('km') + '</small></div>' +
      '</div>' +

      (function() {
        var elev = run.elevation || 0;
        var cols = elev > 0 ? 4 : 3;
        var elevStat = elev > 0
          ? '<div class="stat"><div class="stat-label">' + t('elevation') + '</div><div class="stat-value">' + elev + '</div><div class="stat-sub">' + t('m') + '</div></div>'
          : '';
        var elevDetail = elev === 0
          ? '<div class="details-row"><span class="details-key">' + t('elevation') + '</span>' + elev + ' ' + t('m') + '</div>'
          : '';
        return '<div class="run-stats" style="grid-template-columns:repeat(' + cols + ',1fr)">' +
          '<div class="stat"><div class="stat-label">' + t('pace') + '</div><div class="stat-value">' + calcPace(run.distance_km, run.total_time) + '</div><div class="stat-sub">' + t('min_km') + '</div></div>' +
          '<div class="stat"><div class="stat-label">' + t('avg_hr') + '</div><div class="stat-value">' + run.hr_avg + '</div><div class="stat-sub">' + t('bpm') + '</div></div>' +
          '<div class="stat"><div class="stat-label">' + t('total_time') + '</div><div class="stat-value">' + run.total_time + '</div></div>' +
          elevStat +
        '</div>' +

        '<div class="expand-row">' +
          '<button class="expand-btn" id="ebtn-' + i + '" onclick="event.stopPropagation(); toggleDetails(' + i + ')">' +
            '&#9658; &nbsp;' + t('photos_details') +
          '</button>' +
        '</div>' +

        '<div class="run-details" id="det-' + i + '">' +
          '<div class="details-row"><span class="details-key">' + t('det_date') + '</span>' + fmtDate(run.date) + '</div>' +
          '<div class="details-row"><span class="details-key">' + t('det_location') + '</span>' + locStr(run) + '</div>' +
          '<div class="details-row"><span class="details-key">' + t('det_distance') + '</span>' + run.distance_km + ' ' + t('km') + '</div>' +
          '<div class="details-row"><span class="details-key">' + t('det_pace') + '</span>' + calcPace(run.distance_km, run.total_time) + ' ' + t('min_km') + '</div>' +
          '<div class="details-row"><span class="details-key">' + t('det_avg_hr') + '</span>' + run.hr_avg + ' ' + t('bpm') + '</div>' +
          '<div class="details-row"><span class="details-key">' + t('det_max_hr') + '</span>' + run.hr_max + ' ' + t('bpm') + '</div>' +
          elevDetail +
          '<div class="details-row"><span class="details-key">' + t('det_sneakers') + '</span>' + run.sneakers + '</div>' +
          '<div class="photos-wrap">' +
            '<div class="photos-label">' + t('photos') + '</div>' +
            photoGrid(run.photos) +
          '</div>' +
        '</div>';
      }()) +
    '</article>';
  }).join('');
}

// ── Render: Personal Bests ────────────────────────────────────

function renderPBs() {
  document.getElementById('page-pbs').innerHTML = PERSONAL_BESTS.map(function(pb) {
    var photosHtml = (pb.photos && pb.photos.length > 0)
      ? '<div class="pb-photos"><div class="photos-label">' + t('photos') + '</div>' + photoGrid(pb.photos) + '</div>'
      : '';

    var historyHtml;
    if (pb.previous_records && pb.previous_records.length > 0) {
      historyHtml = '<div class="pb-history"><div class="history-head">' + t('prev_records') + '</div>' +
        pb.previous_records.map(function(r) {
          return '<div class="history-row">' +
            '<div class="history-time">' + r.time + '</div>' +
            '<div class="history-date">' + fmtDate(r.date) + '</div>' +
            '<div class="history-loc">' + locStr(r) + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
    } else {
      historyHtml = '<div class="pb-history"><div class="history-head">' + t('prev_records') + '</div>' +
        '<p class="no-photos">' + t('first_time') + '</p></div>';
    }

    return '<article class="pb-card">' +
      '<div class="pb-head">' +
        '<div class="pb-dist-name">' + pb.distance + '</div>' +
        '<div class="pb-time">' + pb.total_time + '</div>' +
      '</div>' +

      '<div class="pb-stats">' +
        '<div class="pb-stat"><div class="stat-label">' + t('date_place') + '</div>' +
          '<div class="stat-value" style="font-size:14px;font-weight:700;">' + fmtDate(pb.date) + '</div>' +
          '<div class="stat-sub">' + locStr(pb) + '</div></div>' +
        '<div class="pb-stat"><div class="stat-label">' + t('pace') + '</div>' +
          '<div class="stat-value">' + calcPace(pb.distance_km, pb.total_time) + '</div>' +
          '<div class="stat-sub">' + t('min_km') + '</div></div>' +
        '<div class="pb-stat"><div class="stat-label">' + t('heart_rate') + '</div>' +
          '<div class="stat-value">' + pb.hr_avg + ' <span style="font-size:11px;color:var(--muted);font-weight:600">' + t('avg') + '</span></div>' +
          '<div class="stat-sub">' + t('max') + ' ' + pb.hr_max + ' ' + t('bpm') + '</div></div>' +
      '</div>' +

      '<div style="padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">' +
        '<span class="stat-label" style="margin:0">' + t('sneakers') + '</span>' +
        '<span style="font-size:14px;font-weight:700;">' + pb.sneakers + '</span>' +
      '</div>' +

      photosHtml +
      historyHtml +
    '</article>';
  }).join('');
}

// ── Language switch ───────────────────────────────────────────

function setLang(lang) {
  LANG = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;

  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-be').classList.toggle('active', lang === 'be');
  document.getElementById('logo').innerHTML      = t('logo');
  document.getElementById('nav-runs').textContent = t('nav_runs');
  document.getElementById('nav-pbs').textContent  = t('nav_pbs');

  buildFilterOptions();
  applyFilters();
  buildPBChartOptions();
  renderPBChart();
  renderPBs();
}

// ── Interactions ──────────────────────────────────────────────

function toggleDetails(i) {
  var det  = document.getElementById('det-'  + i);
  var btn  = document.getElementById('ebtn-' + i);
  var open = det.classList.toggle('open');
  btn.textContent = open ? '▾  ' + t('hide_details') : '▸  ' + t('photos_details');
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('visible'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('visible');
  btn.classList.add('active');
  document.getElementById('runs-filterbar').style.display = name === 'runs' ? ''     : 'none';
  document.getElementById('pbs-chart').style.display      = name === 'pbs'  ? 'block' : 'none';
}

function openLb(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLb(); });

// ── Init ─────────────────────────────────────────────────────
setLang(LANG);
</script>
