<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sergey's Running Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #e8521b;
  --bg: #f0ede8;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #888;
  --border: #e5e1da;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
}
:root.dark {
  --bg: #141414;
  --card: #1e1e1e;
  --text: #e8e4de;
  --muted: #777;
  --border: #2e2e2e;
  --shadow: 0 2px 16px rgba(0,0,0,0.4);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: #1a1a1a;
  color: #fff;
  height: 60px;
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 28px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.4px;
  white-space: nowrap;
}
.logo em { color: var(--accent); font-style: normal; }

nav { display: flex; gap: 4px; }

nav button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.55);
  padding: 6px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1px;
  transition: all 0.15s;
}
nav button:hover:not(.active) { background: rgba(255,255,255,0.08); color: #fff; }
nav button.active { background: var(--accent); color: #fff; }

/* ── Lang switcher ── */
.lang-switch {
  margin-left: auto;
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 3px;
}
.lang-switch button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.45);
  padding: 4px 11px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.lang-switch button:hover:not(.active) { color: #fff; }
.lang-switch button.active { background: var(--accent); color: #fff; }

/* ── Pages ── */
.page { display: none; max-width: 880px; margin: 0 auto; padding: 32px 24px 64px; }
.page.visible { display: block; }

/* ── Run card ── */
.run-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  overflow: hidden;
}

.run-top {
  padding: 20px 24px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  cursor: pointer;
  user-select: none;
}
.run-top:hover { background: #fafaf8; }

.run-meta { flex: 1 1 auto; }

.run-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.run-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  border-radius: 20px;
  padding: 3px 10px 3px 6px;
}
.run-tag img { width: 16px; height: 16px; object-fit: contain; }

.run-when {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.run-location {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.4px;
  line-height: 1.1;
}

.run-dist {
  font-size: 34px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -1.5px;
  line-height: 1;
  white-space: nowrap;
  flex-shrink: 0;
}
.run-dist small {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0;
}

/* Stats row */
.run-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border);
}
.stat {
  padding: 13px 18px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.stat:last-child { border-right: none; }

.stat-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 3px;
}
.stat-value {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.stat-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}

/* Expand toggle */
.expand-row {
  border-top: 1px solid var(--border);
  padding: 0 24px;
  background: #fafaf8;
}
.expand-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 10px 0;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.4px;
  color: var(--accent);
  cursor: pointer;
  text-transform: uppercase;
}

/* Details panel */
.run-details {
  display: none;
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  background: #fafaf8;
}
.run-details.open { display: block; }

.details-row {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 14px;
  line-height: 1.4;
}
.details-key {
  color: var(--muted);
  font-weight: 600;
  min-width: 88px;
  flex-shrink: 0;
}

/* Photos */
.photos-wrap { margin-top: 18px; }
.photos-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.photos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.photo-thumb {
  aspect-ratio: 1;
  border-radius: 10px;
  overflow: hidden;
  background: var(--border);
  cursor: pointer;
}
.photo-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}
.photo-thumb:hover img { transform: scale(1.05); }
.no-photos {
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
}

/* ── Personal Bests page ── */
.pb-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  overflow: hidden;
}

.pb-head {
  background: #1a1a1a;
  color: #fff;
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pb-dist-name {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.pb-time {
  font-size: 34px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -1.5px;
}
.pb-prog {
  font-size: 13px;
  font-weight: 700;
  color: #2a9d4e;
  background: #e8f8ee;
  border-radius: 20px;
  padding: 3px 10px;
  white-space: nowrap;
}

.pb-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--border);
}
.pb-stat {
  padding: 14px 20px;
  border-right: 1px solid var(--border);
}
.pb-stat:last-child { border-right: none; }

.pb-photos { padding: 16px 24px; border-bottom: 1px solid var(--border); }

/* History */
.pb-history { padding: 16px 24px; }
.history-head {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.history-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.history-row:last-child { border-bottom: none; }
.history-time {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  min-width: 70px;
}
.history-date { color: var(--muted); }
.history-loc { margin-left: auto; color: var(--muted); font-size: 13px; }

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 92vw;
  max-height: 92vh;
  object-fit: contain;
  border-radius: 10px;
}
#lb-close {
  position: fixed;
  top: 18px; right: 22px;
  background: none; border: none;
  color: rgba(255,255,255,0.75);
  font-size: 38px; line-height: 1;
  cursor: pointer;
  transition: color 0.1s;
}
#lb-close:hover { color: #fff; }
#lb-prev, #lb-next {
  position: fixed;
  top: 50%; transform: translateY(-50%);
  background: none; border: none;
  color: rgba(255,255,255,0.7);
  font-size: 64px; line-height: 1;
  cursor: pointer;
  padding: 0 18px;
  transition: color 0.1s;
  user-select: none;
}
#lb-prev { left: 0; }
#lb-next { right: 0; }
#lb-prev:hover, #lb-next:hover { color: #fff; }
#lb-prev.hidden, #lb-next.hidden { display: none; }

/* ── Filter bar ── */
.filter-bar {
  max-width: 880px;
  margin: 24px auto 0;
  padding: 0 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.filter-bar select,
.filter-bar input[type="text"] {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  padding: 5px 10px;
  outline: none;
  transition: border-color 0.15s;
}
.filter-bar select:focus,
.filter-bar input[type="text"]:focus { border-color: var(--accent); }

.filter-bar input[type="text"] { width: 130px; }

#filter-reset {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
#filter-reset:hover { border-color: var(--accent); color: var(--accent); }

#runs-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  margin-left: 4px;
}

/* ── Trend chart ── */
.chart-wrap {
  max-width: 880px;
  margin: 20px auto 0;
  padding: 0 24px;
}

.chart-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 20px 24px 16px;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.chart-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1px;
  color: var(--text);
}

.chart-toggle {
  display: flex;
  gap: 4px;
}

.chart-toggle button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
}
.chart-toggle button:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.chart-toggle button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.chart-svg { width: 100%; display: block; overflow: visible; }

/* ── Activities tab ── */
.act-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
}

.chart-toggle-row {
  display: flex;
  justify-content: flex-end;
  padding: 6px 12px 0;
}
.chart-toggle-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: var(--muted);
  padding: 2px 6px;
  line-height: 1;
  transition: color 0.15s;
}
.chart-toggle-btn:hover { color: var(--text); }

.cmp-card { padding-bottom: 8px; }
.cmp-head {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  padding: 14px 20px 10px;
}
.cmp-title-lbl {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: 4px;
}
.cmp-head-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.cmp-custom-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.cmp-legend {
  display: flex;
  gap: 18px;
  padding: 0 20px 10px;
  flex-wrap: wrap;
}
.cmp-leg-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
}
.cmp-leg-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.act-summary {
  background: var(--card);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 14px 22px;
  margin-bottom: 20px;
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
}
.act-sum-item { display: flex; flex-direction: column; }
.act-sum-val {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--accent);
  line-height: 1.1;
}
.act-sum-lbl {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

.act-row {
  background: var(--card);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 12px 20px;
  margin-bottom: 8px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 18px;
  font-size: 14px;
}

.act-type {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 9px;
  border-radius: 10px;
  background: var(--bg);
  color: var(--muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.act-type.trail { background: #edf7ed; color: #2d6a2d; border-color: #a5c8a5; }

.act-stat { display: flex; flex-direction: column; }
.act-stat-val {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.act-stat-lbl {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Responsive ── */
@media (max-width: 580px) {
  .run-stats { grid-template-columns: repeat(2, 1fr); }
  .pb-stats { grid-template-columns: repeat(2, 1fr); }
  .run-dist { font-size: 26px; }
  .pb-time { font-size: 26px; }
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo">Sergey's <em>Running</em> Log</div>
  <nav>
    <button class="active" id="nav-runs" onclick="showPage('runs', this)">All Runs</button>
    <button id="nav-pbs" onclick="showPage('pbs', this)">Personal Bests</button>
    <button id="nav-activities" onclick="showPage('activities', this)">Activities</button>
  </nav>
  <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode"
    style="background:none;border:none;cursor:pointer;font-size:18px;line-height:1;padding:4px 6px;color:rgba(255,255,255,0.7);transition:color 0.15s"
    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">☀</button>
  <div class="lang-switch">
    <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
    <button id="lang-be" onclick="setLang('be')">BE</button>
  </div>
</header>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLb()">
  <button id="lb-close" onclick="closeLb()">×</button>
  <button id="lb-prev" onclick="event.stopPropagation();lbNav(-1)">&#8249;</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
  <button id="lb-next" onclick="event.stopPropagation();lbNav(1)">&#8250;</button>
</div>

<div id="runs-filterbar" class="filter-bar">
  <div class="filter-group">
    <span class="filter-label" id="flabel-year"></span>
    <select id="filter-year" onchange="applyFilters()"></select>
  </div>

  <div class="filter-group">
    <span class="filter-label" id="flabel-distance"></span>
    <select id="filter-distance" onchange="applyFilters()"></select>
  </div>
  <div class="filter-group">
    <span class="filter-label" id="flabel-dtype"></span>
    <select id="filter-dtype" onchange="applyFilters()"></select>
  </div>
  <div class="filter-group">
    <span class="filter-label" id="flabel-search"></span>
    <input type="text" id="filter-search" oninput="applyFilters()" placeholder="…">
  </div>
  <button id="filter-reset" onclick="resetFilters()"></button>
  <span id="runs-count"></span>
</div>

<div id="page-runs" class="page visible"></div>

<div id="pbs-chart" class="chart-wrap" style="display:none">
  <div class="chart-card">
    <div class="chart-header">
      <div class="filter-group">
        <span class="filter-label" id="pbc-label-dist"></span>
        <select id="pbc-distance" onchange="renderPBChart()"></select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="chart-toggle">
          <button class="active" id="pbc-pace" onclick="setPBChartMetric('pace')"></button>
          <button id="pbc-time" onclick="setPBChartMetric('time')"></button>
        </div>
        <button id="pbc-toggle" onclick="togglePBChart()"
          style="background:none;border:none;cursor:pointer;font-size:18px;line-height:1;color:var(--muted);padding:2px 4px;transition:color 0.15s"
          onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">▾</button>
      </div>
    </div>
    <svg class="chart-svg" id="pbc-svg" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
  </div>
</div>

<div id="page-pbs" class="page"></div>

<div id="page-activities" class="page">
  <div class="chart-card" style="margin-bottom:20px">
    <div class="cmp-head">
      <button class="chart-toggle-btn" id="act-chart-toggle" onclick="toggleActChart()">▾</button>
      <div class="act-controls">
        <div class="filter-group">
          <span class="filter-label" id="actl-type"></span>
          <select id="act-type" onchange="renderActivities()"></select>
        </div>
        <div class="filter-group">
          <span class="filter-label" id="actl-metric"></span>
          <select id="act-metric" onchange="renderActivities()">
            <option value="distance" id="aom-distance"></option>
            <option value="runs"     id="aom-runs"></option>
            <option value="time"     id="aom-time"></option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label" id="actl-period"></span>
          <select id="act-period" onchange="onActPeriodChange()">
            <option value="week"       id="aop-week"></option>
            <option value="curr_month" id="aop-curr_month"></option>
            <option value="last_month" id="aop-last_month"></option>
            <option value="curr_year"  id="aop-curr_year"></option>
            <option value="last_year"  id="aop-last_year"></option>
            <option value="custom"     id="aop-custom"></option>
            <option value="all"        id="aop-all"></option>
          </select>
        </div>
        <div id="act-custom-wrap" class="filter-group" style="display:none">
          <input type="date" id="act-from" onchange="renderActivities()"
            style="border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;padding:5px 10px;outline:none">
          <span style="color:var(--muted);padding:0 4px">–</span>
          <input type="date" id="act-to" onchange="renderActivities()"
            style="border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;padding:5px 10px;outline:none">
        </div>
      </div>
    </div>
    <div id="act-chart-body">
      <svg class="chart-svg" id="act-svg" viewBox="0 0 760 160"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
    </div>
  </div>

  <div class="chart-card cmp-card" style="margin-bottom:20px">
    <div class="cmp-head">
      <button class="chart-toggle-btn" id="cmp-chart-toggle" onclick="toggleCmpChart()">▾</button>
      <span class="cmp-title-lbl" id="cmpl-title"></span>
      <div class="cmp-head-controls">
        <span class="filter-label" id="cmpl-period"></span>

function locStr(obj) {
  return (LANG === 'be' && obj.location_be) ? obj.location_be : obj.location;
}

// ── Helpers ───────────────────────────────────────────────────

var BE_MONTHS = [
  'студзеня','лютага','сакавіка','красавіка','траўня','чэрвеня',
  'ліпеня','жніўня','верасня','кастрычніка','лістапада','снежня'
];

var BE_MONTHS_SHORT = [
  'студз','лют','сак','крас','трав','чэрв',
  'ліп','жн','вер','кастр','ліст','снеж'
];

function fmtDate(str) {
  var d = new Date(str + 'T12:00:00');
  if (LANG === 'be') {
    return d.getDate() + ' ' + BE_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
  }
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function calcPace(distance_km, total_time) {
  var parts = total_time.split(':').map(Number);
  var totalSec = parts.length === 3
    ? parts[0] * 3600 + parts[1] * 60 + parts[2]
    : parts[0] * 60 + parts[1];
  var paceSecPerKm = totalSec / distance_km;
  var pm = Math.floor(paceSecPerKm / 60);
  var ps = Math.round(paceSecPerKm % 60);
  if (ps === 60) { pm++; ps = 0; }
  return pm + ':' + (ps < 10 ? '0' + ps : ps);
}

function photoGrid(photos) {
  if (!photos || photos.length === 0)
    return '<p class="no-photos">' + t('no_photos') + '</p>';
  var id = 'pg' + (photoGrid._id = (photoGrid._id || 0) + 1);
  // store the array globally so the lightbox can navigate it
  photoGrid._sets = photoGrid._sets || {};
  photoGrid._sets[id] = photos;
  return '<div class="photos-grid" data-pgid="' + id + '">' +
    photos.map(function(src, i) {
      return '<div class="photo-thumb" onclick="openLb(\'' + id + '\',' + i + ')">' +
               '<img src="' + src + '" alt="" loading="lazy">' +
             '</div>';
    }).join('') +
  '</div>';
}

// ── PB Chart ──────────────────────────────────────────────────

var pbChartMetric = 'pace';

var pbChartExpanded = true;

function togglePBChart() {
  pbChartExpanded = !pbChartExpanded;
  document.getElementById('pbc-svg').style.display    = pbChartExpanded ? '' : 'none';
  document.getElementById('pbc-toggle').textContent   = pbChartExpanded ? '▾' : '▸';
}

function setPBChartMetric(m) {
  pbChartMetric = m;
  document.getElementById('pbc-pace').classList.toggle('active', m === 'pace');
  document.getElementById('pbc-time').classList.toggle('active', m === 'time');
  renderPBChart();
}

function buildPBChartOptions() {
  document.getElementById('pbc-label-dist').textContent = t('pbc_distance');
  document.getElementById('pbc-pace').textContent       = t('pbc_pace');
  document.getElementById('pbc-time').textContent       = t('pbc_time');

  var sel    = document.getElementById('pbc-distance');
  var curVal = sel.value;
  sel.innerHTML = PERSONAL_BESTS.map(function(pb) {
    return '<option value="' + pb.distance + '">' + pb.distance + '</option>';
  }).join('');
  if (curVal && PERSONAL_BESTS.some(function(pb) { return pb.distance === curVal; }))
    sel.value = curVal;
}

function timeToSec(str) {
  var p = str.split(':').map(Number);
  return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2] : p[0]*60 + p[1];
}

function fmtSec(sec) {
  sec = Math.round(sec);
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = sec % 60;
  if (h > 0) return h + ':' + (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
  return m + ':' + (s < 10 ? '0'+s : s);
}

function renderPBChart() {
  var svg = document.getElementById('pbc-svg');
  var distName = document.getElementById('pbc-distance').value;
  var pb = PERSONAL_BESTS.find(function(p) { return p.distance === distName; });
  if (!pb) { svg.innerHTML = ''; return; }

  // Collect all data points: previous records + current PB
  var points = (pb.previous_records || []).map(function(r) {
    return { date: r.date, sec: timeToSec(r.time), loc: r.location };
  });
  points.push({ date: pb.date, sec: timeToSec(pb.total_time), loc: pb.location, isBest: true });
  points.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

  if (points.length < 2) {
    // single point — still draw it
    if (points.length === 0) { svg.innerHTML = ''; return; }
  }

  var W = 760, H = 180, ML = 52, MR = 16, MT = 14, MB = 42;
  var cW = W - ML - MR, cH = H - MT - MB;
  var n  = points.length;
  var isPace = pbChartMetric === 'pace';

  function val(pt) {
    return isPace ? pt.sec / pb.distance_km : pt.sec;
  }

  var vals = points.map(val);
  var minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  var pad  = (maxV - minV) * 0.18 || (isPace ? 10 : 30);
  minV = Math.max(0, minV - pad); maxV += pad;
  var range = maxV - minV || 1;

  function xPos(i) { return n === 1 ? ML + cW/2 : ML + (i / (n-1)) * cW; }
  // lower = better → invert: lower value → top of chart
  function yPos(v) { return MT + ((v - minV) / range) * cH; }

  function fmtVal(v) { return fmtSec(v); }

  // y-axis ticks
  var tickCount = 4, yHtml = '';
  for (var ti = 0; ti <= tickCount; ti++) {
    var tv = minV + (ti / tickCount) * range;
    var ty = yPos(tv);
    yHtml +=
      '<line x1="' + ML + '" y1="' + ty + '" x2="' + (ML+cW) + '" y2="' + ty +
        '" stroke="var(--border)" stroke-width="1"/>' +
      '<text x="' + (ML-5) + '" y="' + (ty+4) +
        '" text-anchor="end" font-size="10" font-family="inherit" fill="var(--muted)">' +
        fmtVal(tv) + '</text>';
  }

  // x-axis: label every point with short date
  var xHtml = points.map(function(pt, i) {
    var d    = new Date(pt.date + 'T12:00:00');
    var mon  = LANG === 'be'
      ? BE_MONTHS_SHORT[d.getMonth()]
      : d.toLocaleDateString('en-GB', { month: 'short' });
    var line1 = mon + ' ' + d.getDate();
    var line2 = d.getFullYear();
    var x = xPos(i);
    return '<text x="' + x + '" y="' + (MT+cH+16) +
      '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' + line1 + '</text>' +
      '<text x="' + x + '" y="' + (MT+cH+28) +
      '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' + line2 + '</text>';
  }).join('');

  // trend line
  var lineHtml = n > 1
    ? '<polyline points="' + points.map(function(pt,i){return xPos(i)+','+yPos(val(pt));}).join(' ') +
      '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>'
    : '';

  // dots — current PB gets a larger filled circle
  var dotsHtml = points.map(function(pt, i) {
    var v   = val(pt);
    var tip = fmtDate(pt.date) + ' · ' + pt.loc + '\n' + fmtVal(v) + (isPace ? ' ' + t('min_km') : '');
    var r   = pt.isBest ? 7 : 5;
    var fill = pt.isBest ? 'var(--accent)' : 'var(--card)';
    var stroke = 'var(--accent)';
    var sw = pt.isBest ? 0 : 2.5;
    return '<circle cx="' + xPos(i) + '" cy="' + yPos(v) + '" r="' + r + '"' +
      ' fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + sw + '">' +
      '<title>' + tip.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</title></circle>';
  }).join('');

  svg.innerHTML = yHtml + xHtml + lineHtml + dotsHtml;
}

// ── Filters ───────────────────────────────────────────────────

function buildFilterOptions() {
  var years     = [...new Set(RUNS.map(r => r.date.slice(0, 4)))].sort().reverse();

  var distances = [...new Set(RUNS.map(r => r.distance_km))].sort((a, b) => a - b);

  var ySel = document.getElementById('filter-year');
  var dSel = document.getElementById('filter-distance');
  var yVal = ySel.value, dVal = dSel.value;

  ySel.innerHTML = '<option value="">' + t('all_years') + '</option>' +
    years.map(y => '<option value="' + y + '">' + y + '</option>').join('');
  dSel.innerHTML = '<option value="">' + t('all_distances') + '</option>' +
    distances.map(d => '<option value="' + d + '">' + d + ' ' + t('km') + '</option>').join('');

  var dtSel = document.getElementById('filter-dtype');
  var dtVal = dtSel.value;
  var usedKeys = new Set(RUNS.map(function(r) { var dt = getDistanceType(r); return dt ? dt.key : ''; }));
  dtSel.innerHTML = '<option value="">' + t('all_types') + '</option>' +
    DTYPE_DEFS.filter(function(d) { return usedKeys.has(d.key); })
              .map(function(d) { return '<option value="' + d.key + '">' + t(d.tag) + '</option>'; }).join('');
  if (dtVal) dtSel.value = dtVal;

  if (yVal) ySel.value = yVal;
  if (dVal) dSel.value = dVal;

  document.getElementById('flabel-year').textContent     = t('filter_year');
  document.getElementById('flabel-distance').textContent = t('filter_distance');
  document.getElementById('flabel-dtype').textContent    = t('filter_dtype');
  document.getElementById('flabel-search').textContent   = t('filter_search');
  document.getElementById('filter-reset').textContent    = t('filter_reset');
}

function applyFilters() {
  var year     = document.getElementById('filter-year').value;
  var distance = document.getElementById('filter-distance').value;
  var dtype    = document.getElementById('filter-dtype').value;
  var search   = document.getElementById('filter-search').value.trim().toLowerCase();

  var filtered = RUNS.filter(function(r) {
    if (year     && r.date.slice(0, 4) !== year)               return false;
    if (distance && r.distance_km !== parseFloat(distance))    return false;
    if (dtype    && getDistanceType(r).key !== dtype)          return false;
    if (search   && !locStr(r).toLowerCase().includes(search)) return false;
    return true;
  });

  renderRuns(filtered);
  document.getElementById('runs-count').textContent =
    (filtered.length < RUNS.length) ? t('runs_shown')(filtered.length, RUNS.length) : '';
}

function resetFilters() {
  document.getElementById('filter-year').value     = '';
  document.getElementById('filter-distance').value = '';
  document.getElementById('filter-dtype').value    = '';
  document.getElementById('filter-search').value   = '';
  applyFilters();
}

// ── Render: All Runs ──────────────────────────────────────────

var DTYPE_DEFS = [
  { key: 'sprint',   icon: 'sprint',   tag: 'tag_sprint',   test: function(m) { return m <= 400; } },
  { key: 'mid',      icon: 'short',    tag: 'tag_mid',      test: function(m) { return m <= 3000; } },
  { key: 'long',     icon: 'long',     tag: 'tag_long',     test: function(m) { return m < 42195; } },
  { key: 'marathon', icon: 'marathon', tag: 'tag_marathon',  test: function(m) { return m === 42195; } },
  { key: 'ultra',    icon: 'ultra',    tag: 'tag_ultra',    test: function(m) { return true; } },
];

function getDistanceType(run) {
  var m = Math.round(run.distance_km * 1000);
  for (var i = 0; i < DTYPE_DEFS.length; i++) {
    if (DTYPE_DEFS[i].test(m)) return DTYPE_DEFS[i];
  }
}

function runTags(run) {
  var dt   = getDistanceType(run);
  var tags = ['<span class="run-tag"><img src="data/icons/' + dt.icon + '.png" alt="">' + t(dt.tag) + '</span>'];
  if ((run.elevation || 0) > 0)
    tags.push('<span class="run-tag"><img src="data/icons/trail.png" alt="">' + t('tag_trail') + '</span>');
  return '<div class="run-tags">' + tags.join('') + '</div>';
}

function renderRuns(runs) {
  if (!runs) runs = RUNS;
  var sorted = runs.slice().sort(function(a, b) {
    return new Date(b.date) - new Date(a.date);
  });

  document.getElementById('page-runs').innerHTML = sorted.map(function(run, i) {
    return '<article class="run-card">' +
      '<div class="run-top" onclick="toggleDetails(' + i + ')">' +
        '<div class="run-meta">' +
          '<div class="run-when">' + fmtDate(run.date) + '</div>' +
          '<div class="run-location">' + locStr(run) + '</div>' +
          runTags(run) +
        '</div>' +
        '<div class="run-dist">' + run.distance_km + '<small> ' + t('km') + '</small></div>' +
      '</div>' +

      (function() {
        var elev = run.elevation || 0;
        var cols = elev > 0 ? 4 : 3;
        var elevStat = elev > 0
          ? '<div class="stat"><div class="stat-label">' + t('elevation') + '</div><div class="stat-value">' + elev + '</div><div class="stat-sub">' + t('m') + '</div></div>'
          : '';
        var elevDetail = elev === 0
          ? '<div class="details-row"><span class="details-key">' + t('elevation') + '</span>' + elev + ' ' + t('m') + '</div>'
          : '';

        pb.previous_records.map(function(r) {

            '<div class="history-time">' + r.time + '</div>' +

    var progHtml = '';

      '<div class="pb-head">' +
        '<div class="pb-dist-name">' + pb.distance + '</div>' +
        '<div style="display:flex;align-items:center;gap:10px;">' +

          '<div class="stat-value">' + calcPace(pb.distance_km, pb.total_time) + '</div>' +
          '<div class="stat-sub">' + t('min_km') + '</div></div>' +
        '<div class="pb-stat"><div class="stat-label">' + t('heart_rate') + '</div>' +
          '<div class="stat-value">' + (pb.hr_avg || '--') + (pb.hr_avg ? ' <span style="font-size:11px;color:var(--muted);font-weight:600">' + t('avg') + '</span>' : '') + '</div>' +
          '<div class="stat-sub">' + (pb.hr_max ? t('max') + ' ' + pb.hr_max + ' ' + t('bpm') : '--') + '</div></div>' +
      '</div>' +

      '<div style="padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">' +
        '<span class="stat-label" style="margin:0">' + t('sneakers') + '</span>' +

      (pb.video ? '<div style="padding:10px 24px;border-bottom:1px solid var(--border)">' +

function getActBounds() {
  var period = document.getElementById('act-period').value;
  var now    = new Date();
  var end    = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  var start;
  if (period === 'week') {
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 6);
  } else if (period === 'curr_month') {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
  } else if (period === 'last_month') {
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 29);
  } else if (period === 'curr_year') {
    start = new Date(now.getFullYear(), 0, 1);
  } else if (period === 'last_year') {
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 364);
  } else if (period === 'all') {
    start = new Date(0);
  } else {
    var from = document.getElementById('act-from').value;
    var to   = document.getElementById('act-to').value;
    start = from ? new Date(from) : new Date(0);
    end   = to   ? new Date(to + 'T23:59:59') : new Date();
  }
  return { start: start, end: end };
}

function getActFiltered(start, end) {
  var type = document.getElementById('act-type').value;
  return ACTIVITIES.filter(function(a) {
    var d = new Date(a.date + 'T12:00:00');
    if (d < start || d > end) return false;
    if (type !== 'all' && a.type !== type) return false;
    return true;
  });
}

function actTimeToMin(s) {
  var p = s.split(':').map(Number);
  return p.length === 3 ? p[0] * 60 + p[1] + p[2] / 60 : p[0] + p[1] / 60;
}

function fmtActTotalTime(min) {
  var h = Math.floor(min / 60), m = Math.round(min % 60);
  if (h > 0) return h + t('act_h') + (m > 0 ? ' ' + m + t('act_min') : '');
  return m + t('act_min');
}

function localDateStr(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function getActBucketKey(dateStr, bType) {
  if (bType === 'year')  return dateStr.slice(0, 4);
  if (bType === 'month') return dateStr.slice(0, 7);
  if (bType === 'day')   return dateStr;
  var d = new Date(dateStr + 'T12:00:00');
  var dow = d.getDay() || 7;
  d.setDate(d.getDate() - (dow - 1));
  return localDateStr(d);
}

function genActBucketKeys(start, end, bType) {
  var keys = [], cur;
  if (bType === 'day') {
    cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
    while (cur <= end) {
      keys.push(localDateStr(cur));
      cur.setDate(cur.getDate() + 1);
    }
  } else if (bType === 'year') {
    cur = new Date(start.getFullYear(), 0, 1);
    while (cur <= end) {
      keys.push(String(cur.getFullYear()));
      cur.setFullYear(cur.getFullYear() + 1);
    }
  } else if (bType === 'month') {
    cur = new Date(start.getFullYear(), start.getMonth(), 1);
    while (cur <= end) {
      keys.push(cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0'));
      cur.setMonth(cur.getMonth() + 1);
    }
  } else {
    cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
    var dow = cur.getDay() || 7;
    cur.setDate(cur.getDate() - (dow - 1));
    while (cur <= end) {
      keys.push(localDateStr(cur));
      cur.setDate(cur.getDate() + 7);
    }
  }
  return keys;
}

function fmtActBucketLabel(key, bType) {
  if (bType === 'year') return key;
  if (bType === 'month') {
    var d = new Date(key + '-01T12:00:00');
    return LANG === 'be' ? BE_MONTHS_SHORT[d.getMonth()]
                         : d.toLocaleDateString('en-GB', { month: 'short' });
  }
  var d = new Date(key + 'T12:00:00');
  var mon = LANG === 'be' ? BE_MONTHS_SHORT[d.getMonth()]
                          : d.toLocaleDateString('en-GB', { month: 'short' });
  return bType === 'day' ? String(d.getDate()) : mon + ' ' + d.getDate();
}

function onActPeriodChange() {
  document.getElementById('act-custom-wrap').style.display =
    document.getElementById('act-period').value === 'custom' ? 'flex' : 'none';
  renderActivities();
}

function renderActChart(acts, bounds) {
  var svg    = document.getElementById('act-svg');
  var metric = document.getElementById('act-metric').value;
  var days   = Math.round((bounds.end - bounds.start) / 86400000);
  var bType  = days <= 31 ? 'day' : days <= 90 ? 'week' : days <= 1095 ? 'month' : 'year';
  var keys   = genActBucketKeys(bounds.start, bounds.end, bType);

  var map = {};
  keys.forEach(function(k) { map[k] = { n: 0, dist: 0, time: 0 }; });
  acts.forEach(function(a) {
    var k = getActBucketKey(a.date, bType);
    if (map[k]) { map[k].n++; map[k].dist += a.distance_km; map[k].time += actTimeToMin(a.time); }
  });

  if (bType === 'year') {
    keys = keys.filter(function(k) { return map[k].n > 0; });
  }

  var vals = keys.map(function(k) {
    return metric === 'distance' ? map[k].dist
         : metric === 'runs'     ? map[k].n
         : map[k].time / 60;
  });

  var maxV = Math.max.apply(null, vals) || 1;
  var W = 760, H = 160, ML = 46, MR = 12, MT = 10, MB = 30;
  var cW = W - ML - MR, cH = H - MT - MB;
  var n = keys.length;
  var slotW = cW / n;
  var barW  = Math.min(36, Math.max(4, slotW * 0.7));

  var yHtml = '';
  for (var ti = 0; ti <= 3; ti++) {
    var tv = (ti / 3) * maxV;
    var ty = MT + cH - (tv / maxV) * cH;
    var lbl = metric === 'distance' ? tv.toFixed(1)
            : metric === 'runs'     ? Math.round(tv).toString()
            : tv.toFixed(1);
    yHtml += '<line x1="' + ML + '" y1="' + ty + '" x2="' + (ML + cW) + '" y2="' + ty +
             '" stroke="var(--border)" stroke-width="1"/>' +
             '<text x="' + (ML - 5) + '" y="' + (ty + 4) +
             '" text-anchor="end" font-size="10" font-family="inherit" fill="var(--muted)">' + lbl + '</text>';
  }

  var barsHtml = '', xHtml = '';
  var labelEvery = Math.ceil(n / 12);
  keys.forEach(function(k, i) {
    var v  = vals[i];
    var cx = ML + (i + 0.5) * slotW;
    if (v > 0) {
      var bh = (v / maxV) * cH, by = MT + cH - bh;
      var tipVal = metric === 'distance' ? v.toFixed(1) + ' km'
                 : metric === 'runs'     ? v + (v !== 1 ? ' runs' : ' run')
                 : fmtActTotalTime(v * 60);
      barsHtml += '<rect x="' + (cx - barW / 2) + '" y="' + by + '" width="' + barW + '" height="' + bh +
                  '" rx="3" fill="var(--accent)" opacity="0.85">' +
                  '<title>' + fmtActBucketLabel(k, bType) + ': ' + tipVal + '</title></rect>';
    }
    if (i % labelEvery === 0 || i === n - 1) {
      xHtml += '<text x="' + cx + '" y="' + (MT + cH + 16) +
               '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' +
               fmtActBucketLabel(k, bType) + '</text>';
    }
  });

  svg.innerHTML = yHtml + barsHtml + xHtml;
}

function fmtPeriodDuration(days) {
  var yrs = Math.floor(days / 365);
  var rem = days - yrs * 365;
  var mos = Math.floor(rem / 30);
  var ds  = rem - mos * 30;
  var parts = [];
  if (yrs > 0) parts.push(yrs + ' ' + t('act_yr'));
  if (mos > 0) parts.push(mos + ' ' + t('act_mo'));
  if (ds  > 0 || parts.length === 0) parts.push(ds + ' ' + t('act_d'));
  return parts.join(' ');
}

function renderActList(acts, bounds) {
  var el = document.getElementById('act-list');
  if (acts.length === 0) {
    el.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:32px 0">' +
                   t('act_no_data') + '</p>';
    return;
  }
  var sorted = acts.slice().sort(function(a, b) { return b.datetime.localeCompare(a.datetime); });
  var totalDist = 0, totalMin = 0;
  sorted.forEach(function(a) { totalDist += a.distance_km; totalMin += actTimeToMin(a.time); });

  // Compute period span
  var periodStart = bounds ? bounds.start : null;
  var periodEnd   = bounds ? bounds.end   : null;
  // For "all years" the start is epoch (new Date(0)); use actual activity dates instead
  if (periodStart && periodStart.getTime() === 0 && sorted.length > 0) {
    var dates = sorted.map(function(a) { return new Date(a.date); });
    periodStart = new Date(Math.min.apply(null, dates));
    periodEnd   = new Date(Math.max.apply(null, dates));
  }
  var periodDays = 0;
  if (periodStart && periodEnd) {
    periodDays = Math.round((periodEnd - periodStart) / 86400000);
  }

  var summaryHtml =
    '<div class="act-summary">' +
      '<div class="act-sum-item"><span class="act-sum-val">' + sorted.length + '</span>' +
        '<span class="act-sum-lbl">' + t('act_metric_runs') + '</span></div>' +
      '<div class="act-sum-item"><span class="act-sum-val">' + totalDist.toFixed(1) + '</span>' +
        '<span class="act-sum-lbl">' + t('km') + '</span></div>' +
      '<div class="act-sum-item"><span class="act-sum-val">' + fmtActTotalTime(totalMin) + '</span>' +
        '<span class="act-sum-lbl">' + t('total_time') + '</span></div>' +
      (periodDays > 0
        ? '<div class="act-sum-item"><span class="act-sum-val">' + fmtPeriodDuration(periodDays) + '</span>' +
            '<span class="act-sum-lbl">' + t('act_period_duration') + '</span></div>'
        : '') +
      (periodDays >= 7
        ? '<div class="act-sum-item"><span class="act-sum-val">' + (totalDist / (periodDays / 7)).toFixed(1) + '</span>' +
            '<span class="act-sum-lbl">' + t('act_avg_week') + '</span></div>'
        : '') +
      (periodDays >= 30
        ? '<div class="act-sum-item"><span class="act-sum-val">' + (totalDist / (periodDays / 30)).toFixed(1) + '</span>' +
            '<span class="act-sum-lbl">' + t('act_avg_month') + '</span></div>'
        : '') +
      (periodDays >= 365
        ? '<div class="act-sum-item"><span class="act-sum-val">' + (totalDist / (periodDays / 365)).toFixed(1) + '</span>' +
            '<span class="act-sum-lbl">' + t('act_avg_year') + '</span></div>'
        : '') +
    '</div>';

  var listHtml = sorted.map(function(a) {
    var pace       = a.distance_km > 0 ? calcPace(a.distance_km, a.time) : '--';
    var elevHtml   = a.elevation > 0
      ? '<div class="act-stat"><span class="act-stat-val">' + a.elevation + '</span>' +
        '<span class="act-stat-lbl">' + t('elevation') + ', ' + t('m') + '</span></div>'
      : '';
    var typeClass  = a.type.toLowerCase().indexOf('trail') !== -1 ? ' trail' : '';
    return '<div class="act-row">' +
      '<div style="min-width:110px;font-size:13px;color:var(--muted);font-weight:600">' + fmtDate(a.date) + '</div>' +
      '<span class="act-type' + typeClass + '">' + a.type + '</span>' +
      '<div class="act-stat"><span class="act-stat-val">' + a.distance_km.toFixed(2) + '</span>' +
        '<span class="act-stat-lbl">' + t('km') + '</span></div>' +
      '<div class="act-stat"><span class="act-stat-val">' + a.time + '</span>' +
        '<span class="act-stat-lbl">' + t('total_time') + '</span></div>' +
      '<div class="act-stat"><span class="act-stat-val">' + pace + '</span>' +
        '<span class="act-stat-lbl">' + t('min_km') + '</span></div>' +
      elevHtml +
    '</div>';
  }).join('');

  el.innerHTML = summaryHtml + listHtml;
}

function renderActivities() {
  var bounds = getActBounds();
  var acts   = getActFiltered(bounds.start, bounds.end);
  renderActChart(acts, bounds);
  renderActList(acts, bounds);
  renderCmpChart();
}

function getCmpBounds() {
  var period = document.getElementById('cmp-period').value;
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var p1s, p1e, p2s, p2e, bType, n;

  if (period === 'week') {
    p1e = new Date(today); p1e.setHours(23,59,59);
    p1s = new Date(today); p1s.setDate(today.getDate() - 6);
    p2e = new Date(today); p2e.setDate(today.getDate() - 7); p2e.setHours(23,59,59);
    p2s = new Date(today); p2s.setDate(today.getDate() - 13);
    bType = 'day'; n = 7;
  } else if (period === 'month') {
    p1e = new Date(today); p1e.setHours(23,59,59);
    p1s = new Date(today); p1s.setDate(today.getDate() - 29);
    p2e = new Date(today); p2e.setDate(today.getDate() - 30); p2e.setHours(23,59,59);
    p2s = new Date(today); p2s.setDate(today.getDate() - 59);
    bType = 'day'; n = 30;
  } else if (period === 'year') {
    p1e = new Date(today); p1e.setHours(23,59,59);
    p1s = new Date(today); p1s.setDate(today.getDate() - 364);
    p2e = new Date(today); p2e.setDate(today.getDate() - 365); p2e.setHours(23,59,59);
    p2s = new Date(today); p2s.setDate(today.getDate() - 729);
    bType = 'month'; n = 12;
  } else {
    var f1 = document.getElementById('cmp-p1-from').value;
    var t1 = document.getElementById('cmp-p1-to').value;
    var f2 = document.getElementById('cmp-p2-from').value;
    var t2 = document.getElementById('cmp-p2-to').value;
    if (!f1 || !t1 || !f2 || !t2) return null;
    p1s = new Date(f1); p1e = new Date(t1 + 'T23:59:59');
    p2s = new Date(f2); p2e = new Date(t2 + 'T23:59:59');
    var days = Math.round((p1e - p1s) / 86400000);
    if (days <= 31)       { bType = 'day';   n = days + 1; }
    else if (days <= 90)  { bType = 'week';  n = Math.ceil((days + 1) / 7); }
    else                  { bType = 'month';
      var sm = p1s.getFullYear() * 12 + p1s.getMonth();
      var em = p1e.getFullYear() * 12 + p1e.getMonth();
      n = em - sm + 1;
    }
  }
  return { p1s: p1s, p1e: p1e, p2s: p2s, p2e: p2e, bType: bType, n: n };
}

function cmpBucketActs(acts, pstart, bType, n) {
  var metric = document.getElementById('act-metric').value;
  var vals = new Array(n).fill(0);
  acts.forEach(function(a) {
    var d = new Date(a.date + 'T12:00:00');
    var idx;
    if (bType === 'day') {
      idx = Math.round((d - pstart) / 86400000);
    } else if (bType === 'week') {
      idx = Math.floor((d - pstart) / (7 * 86400000));
    } else {
      var sm = pstart.getFullYear() * 12 + pstart.getMonth();
      idx = (d.getFullYear() * 12 + d.getMonth()) - sm;
    }
    if (idx >= 0 && idx < n) {
      if (metric === 'distance')    vals[idx] += a.distance_km;
      else if (metric === 'runs')   vals[idx]++;
      else                          vals[idx] += actTimeToMin(a.time) / 60;
    }
  });
  return vals;
}

function cmpXLabel(i, p1s, bType, period) {
  if (bType === 'day') {
    if (period === 'week') {
      var di = (p1s.getDay() + i) % 7;
      return LANG === 'be' ? BE_DAYS_SHORT[di] : EN_DAYS_SHORT[di];
    }
    return String(i + 1);
  }
  if (bType === 'week') return String(i + 1);
  var mi = (p1s.getMonth() + i) % 12;
  return LANG === 'be' ? BE_MONTHS_SHORT[mi] : EN_MONTHS_SHORT[mi];
}

function cmpFmtRange(s, e) {
  var mo = LANG === 'be' ? BE_MONTHS_SHORT : EN_MONTHS_SHORT;
  var fs = s.getDate() + ' ' + mo[s.getMonth()];
  var fe = e.getDate() + ' ' + mo[e.getMonth()];
  if (s.getFullYear() !== e.getFullYear()) fs += ' ' + s.getFullYear();
  return fs + ' – ' + fe + ' ' + e.getFullYear();
}

function renderCmpChart() {
  var svg    = document.getElementById('cmp-svg');
  var legend = document.getElementById('cmp-legend');
  var bounds = getCmpBounds();
  if (!bounds) { svg.innerHTML = ''; legend.innerHTML = ''; return; }

  var period = document.getElementById('cmp-period').value;
  var metric = document.getElementById('act-metric').value;
  var acts1  = getActFiltered(bounds.p1s, bounds.p1e);
  var acts2  = getActFiltered(bounds.p2s, bounds.p2e);
  var vals1  = cmpBucketActs(acts1, bounds.p1s, bounds.bType, bounds.n);
  var vals2  = cmpBucketActs(acts2, bounds.p2s, bounds.bType, bounds.n);

  legend.innerHTML =
    '<span class="cmp-leg-item"><span class="cmp-leg-dot" style="background:var(--accent)"></span>' + cmpFmtRange(bounds.p1s, bounds.p1e) + '</span>' +
    '<span class="cmp-leg-item"><span class="cmp-leg-dot" style="background:#5b8def"></span>' + cmpFmtRange(bounds.p2s, bounds.p2e) + '</span>';

  var maxV = Math.max(Math.max.apply(null, vals1), Math.max.apply(null, vals2)) || 1;
  var W = 760, H = 160, ML = 46, MR = 12, MT = 10, MB = 30;
  var cW = W - ML - MR, cH = H - MT - MB;
  var n = bounds.n;
  var slotW = cW / n;
  var barW  = Math.min(18, Math.max(2, slotW * 0.3));
  var gap   = Math.max(1, barW * 0.3);

  var yHtml = '';
  for (var ti = 0; ti <= 3; ti++) {
    var tv = (ti / 3) * maxV;
    var ty = MT + cH - (tv / maxV) * cH;
    var lbl = metric === 'runs' ? Math.round(tv).toString() : tv.toFixed(1);
    yHtml += '<line x1="' + ML + '" y1="' + ty + '" x2="' + (ML + cW) + '" y2="' + ty +
             '" stroke="var(--border)" stroke-width="1"/>' +
             '<text x="' + (ML - 5) + '" y="' + (ty + 4) +
             '" text-anchor="end" font-size="10" font-family="inherit" fill="var(--muted)">' + lbl + '</text>';
  }

  var barsHtml = '', xHtml = '';
  var labelEvery = Math.ceil(n / 12);
  for (var i = 0; i < n; i++) {
    var cx    = ML + (i + 0.5) * slotW;
    var bar1x = cx - barW - gap / 2;
    var bar2x = cx + gap / 2;

    if (vals1[i] > 0) {
      var bh = (vals1[i] / maxV) * cH, by = MT + cH - bh;
      barsHtml += '<rect x="' + bar1x + '" y="' + by + '" width="' + barW + '" height="' + bh +
                  '" rx="2" fill="var(--accent)" opacity="0.85">' +
                  '<title>' + cmpXLabel(i, bounds.p1s, bounds.bType, period) + ' (' + cmpFmtRange(bounds.p1s, bounds.p1e) + '): ' + vals1[i].toFixed(metric === 'runs' ? 0 : 1) + '</title></rect>';
    }
    if (vals2[i] > 0) {
      var bh2 = (vals2[i] / maxV) * cH, by2 = MT + cH - bh2;
      barsHtml += '<rect x="' + bar2x + '" y="' + by2 + '" width="' + barW + '" height="' + bh2 +
                  '" rx="2" fill="#5b8def" opacity="0.85">' +
                  '<title>' + cmpXLabel(i, bounds.p1s, bounds.bType, period) + ' (' + cmpFmtRange(bounds.p2s, bounds.p2e) + '): ' + vals2[i].toFixed(metric === 'runs' ? 0 : 1) + '</title></rect>';
    }
    if (i % labelEvery === 0 || i === n - 1) {
      xHtml += '<text x="' + cx + '" y="' + (MT + cH + 16) +
               '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' +
               cmpXLabel(i, bounds.p1s, bounds.bType, period) + '</text>';
    }
  }

  svg.innerHTML = yHtml + barsHtml + xHtml;
}

// ── Language switch ───────────────────────────────────────────

function toggleTheme() {
  var dark = document.documentElement.classList.toggle('dark');
  document.getElementById('theme-toggle').textContent = dark ? '☽' : '☀';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
(function() {
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
    document.getElementById('theme-toggle').textContent = '☽';
  }
})();

function setLang(lang) {
  LANG = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;

  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-be').classList.toggle('active', lang === 'be');
  document.getElementById('logo').innerHTML      = t('logo');
  document.getElementById('nav-runs').textContent        = t('nav_runs');
  document.getElementById('nav-pbs').textContent         = t('nav_pbs');
  document.getElementById('nav-activities').textContent  = t('nav_activities');

  buildFilterOptions();
  applyFilters();
  buildPBChartOptions();
  renderPBChart();
  renderPBs();
  initActivitiesControls();
  renderActivities();
}

// ── Interactions ──────────────────────────────────────────────

function toggleDetails(i) {
  var det  = document.getElementById('det-'  + i);
  var btn  = document.getElementById('ebtn-' + i);
  var open = det.classList.toggle('open');
  btn.textContent = open ? '▾  ' + t('hide_details') : '▸  ' + t('photos_details');
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('visible'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('visible');
  btn.classList.add('active');
  document.getElementById('runs-filterbar').style.display = name === 'runs' ? ''      : 'none';
  document.getElementById('pbs-chart').style.display      = name === 'pbs'  ? 'block' : 'none';
  if (name === 'activities') { initActivitiesControls(); renderActivities(); }
}

var _lbSet = [], _lbIdx = 0;

function openLb(setId, idx) {
  _lbSet = (photoGrid._sets && photoGrid._sets[setId]) || [];
  _lbIdx = idx || 0;
  _lbShow();
}
function _lbShow() {
  document.getElementById('lb-img').src = _lbSet[_lbIdx];
  document.getElementById('lightbox').classList.add('open');
  document.getElementById('lb-prev').classList.toggle('hidden', _lbIdx === 0);
  document.getElementById('lb-next').classList.toggle('hidden', _lbIdx === _lbSet.length - 1);
}
function lbNav(dir) {
  var next = _lbIdx + dir;
  if (next >= 0 && next < _lbSet.length) { _lbIdx = next; _lbShow(); }
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowLeft')   lbNav(-1);
  if (e.key === 'ArrowRight')  lbNav(1);
});

// ── Init ─────────────────────────────────────────────────────
setLang(LANG);
</script>
