<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sergey's Running Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #e8521b;
  --bg: #f0ede8;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #888;
  --border: #e5e1da;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: #1a1a1a;
  color: #fff;
  height: 60px;
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 28px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.4px;
  white-space: nowrap;
}
.logo em { color: var(--accent); font-style: normal; }

nav { display: flex; gap: 4px; }

nav button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.55);
  padding: 6px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1px;
  transition: all 0.15s;
}
nav button:hover:not(.active) { background: rgba(255,255,255,0.08); color: #fff; }
nav button.active { background: var(--accent); color: #fff; }

/* ── Lang switcher ── */
.lang-switch {
  margin-left: auto;
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 3px;
}
.lang-switch button {
  background: none;
  border: none;
  color: rgba(255,255,255,0.45);
  padding: 4px 11px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.lang-switch button:hover:not(.active) { color: #fff; }
.lang-switch button.active { background: var(--accent); color: #fff; }

/* ── Pages ── */
.page { display: none; max-width: 880px; margin: 0 auto; padding: 32px 24px 64px; }
.page.visible { display: block; }

/* ── Run card ── */
.run-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  overflow: hidden;
}

.run-top {
  padding: 20px 24px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  cursor: pointer;
  user-select: none;
}
.run-top:hover { background: #fafaf8; }

.run-meta { flex: 1 1 auto; }

.run-when {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.run-location {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.4px;
  line-height: 1.1;
}

.run-dist {
  font-size: 34px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -1.5px;
  line-height: 1;
  white-space: nowrap;
  flex-shrink: 0;
}
.run-dist small {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0;
}

/* Stats row */
.run-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border);
}
.stat {
  padding: 13px 18px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.stat:last-child { border-right: none; }

.stat-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 3px;
}
.stat-value {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.stat-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}

/* Expand toggle */
.expand-row {
  border-top: 1px solid var(--border);
  padding: 0 24px;
  background: #fafaf8;
}
.expand-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 10px 0;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.4px;
  color: var(--accent);
  cursor: pointer;
  text-transform: uppercase;
}

/* Details panel */
.run-details {
  display: none;
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  background: #fafaf8;
}
.run-details.open { display: block; }

.details-row {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 14px;
  line-height: 1.4;
}
.details-key {
  color: var(--muted);
  font-weight: 600;
  min-width: 88px;
  flex-shrink: 0;
}

/* Photos */
.photos-wrap { margin-top: 18px; }
.photos-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.photos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.photo-thumb {
  aspect-ratio: 1;
  border-radius: 10px;
  overflow: hidden;
  background: var(--border);
  cursor: pointer;
}
.photo-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.2s;
}
.photo-thumb:hover img { transform: scale(1.05); }
.no-photos {
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
}

/* ── Personal Bests page ── */
.pb-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  overflow: hidden;
}

.pb-head {
  background: #1a1a1a;
  color: #fff;
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pb-dist-name {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.pb-time {
  font-size: 34px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -1.5px;
}

.pb-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--border);
}
.pb-stat {
  padding: 14px 20px;
  border-right: 1px solid var(--border);
}
.pb-stat:last-child { border-right: none; }

.pb-photos { padding: 16px 24px; border-bottom: 1px solid var(--border); }

/* History */
.pb-history { padding: 16px 24px; }
.history-head {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.history-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.history-row:last-child { border-bottom: none; }
.history-time {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  min-width: 70px;
}
.history-date { color: var(--muted); }
.history-loc { margin-left: auto; color: var(--muted); font-size: 13px; }

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.93);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 92vw;
  max-height: 92vh;
  object-fit: contain;
  border-radius: 10px;
}
#lb-close {
  position: fixed;
  top: 18px; right: 22px;
  background: none; border: none;
  color: rgba(255,255,255,0.75);
  font-size: 38px; line-height: 1;
  cursor: pointer;
  transition: color 0.1s;
}
#lb-close:hover { color: #fff; }

/* ── Filter bar ── */
.filter-bar {
  max-width: 880px;
  margin: 24px auto 0;
  padding: 0 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.filter-bar select,
.filter-bar input[type="text"] {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  padding: 5px 10px;
  outline: none;
  transition: border-color 0.15s;
}
.filter-bar select:focus,
.filter-bar input[type="text"]:focus { border-color: var(--accent); }

.filter-bar input[type="text"] { width: 130px; }

#filter-reset {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
#filter-reset:hover { border-color: var(--accent); color: var(--accent); }

#runs-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  margin-left: 4px;
}

/* ── Trend chart ── */
.chart-wrap {
  max-width: 880px;
  margin: 20px auto 0;
  padding: 0 24px;
}

.chart-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 20px 24px 16px;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.chart-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1px;
  color: var(--text);
}

.chart-toggle {
  display: flex;
  gap: 4px;
}

.chart-toggle button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
}
.chart-toggle button:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.chart-toggle button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.chart-svg { width: 100%; display: block; overflow: visible; }

/* ── Activities tab ── */
.act-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
}

.act-summary {
  background: var(--card);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 14px 22px;
  margin-bottom: 20px;
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
}
.act-sum-item { display: flex; flex-direction: column; }
.act-sum-val {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--accent);
  line-height: 1.1;
}
.act-sum-lbl {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

.act-row {
  background: var(--card);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 12px 20px;
  margin-bottom: 8px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 18px;
  font-size: 14px;
}

.act-type {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 9px;
  border-radius: 10px;
  background: var(--bg);
  color: var(--muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.act-type.trail { background: #edf7ed; color: #2d6a2d; border-color: #a5c8a5; }

.act-stat { display: flex; flex-direction: column; }
.act-stat-val {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.act-stat-lbl {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Responsive ── */
@media (max-width: 580px) {
  .run-stats { grid-template-columns: repeat(2, 1fr); }
  .pb-stats { grid-template-columns: repeat(2, 1fr); }
  .run-dist { font-size: 26px; }
  .pb-time { font-size: 26px; }
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo">Sergey's <em>Running</em> Log</div>
  <nav>
    <button class="active" id="nav-runs" onclick="showPage('runs', this)">All Runs</button>
    <button id="nav-pbs" onclick="showPage('pbs', this)">Personal Bests</button>
    <button id="nav-activities" onclick="showPage('activities', this)">Activities</button>
  </nav>
  <div class="lang-switch">
    <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
    <button id="lang-be" onclick="setLang('be')">BE</button>
  </div>
</header>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLb()">
  <button id="lb-close" onclick="closeLb()">×</button>
  <img id="lb-img" src="" alt="">
</div>

<div id="runs-filterbar" class="filter-bar">
  <div class="filter-group">
    <span class="filter-label" id="flabel-year"></span>
    <select id="filter-year" onchange="applyFilters()"></select>
  </div>

  <div class="filter-group">
    <span class="filter-label" id="flabel-distance"></span>
    <select id="filter-distance" onchange="applyFilters()"></select>
  </div>
  <div class="filter-group">
    <span class="filter-label" id="flabel-search"></span>
    <input type="text" id="filter-search" oninput="applyFilters()" placeholder="…">
  </div>
  <button id="filter-reset" onclick="resetFilters()"></button>
  <span id="runs-count"></span>
</div>

<div id="page-runs" class="page visible"></div>

<div id="pbs-chart" class="chart-wrap" style="display:none">
  <div class="chart-card">
    <div class="chart-header">
      <div class="filter-group">
        <span class="filter-label" id="pbc-label-dist"></span>
        <select id="pbc-distance" onchange="renderPBChart()"></select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="chart-toggle">
          <button class="active" id="pbc-pace" onclick="setPBChartMetric('pace')"></button>
          <button id="pbc-time" onclick="setPBChartMetric('time')"></button>
        </div>
        <button id="pbc-toggle" onclick="togglePBChart()"
          style="background:none;border:none;cursor:pointer;font-size:18px;line-height:1;color:var(--muted);padding:2px 4px;transition:color 0.15s"
          onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">▾</button>
      </div>
    </div>
    <svg class="chart-svg" id="pbc-svg" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
  </div>
</div>

<div id="page-pbs" class="page"></div>

<div id="page-activities" class="page">
  <div class="act-controls">
    <div class="filter-group">
      <span class="filter-label" id="actl-type"></span>
      <select id="act-type" onchange="renderActivities()"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label" id="actl-metric"></span>
      <select id="act-metric" onchange="renderActivities()">
        <option value="distance" id="aom-distance"></option>
        <option value="runs"     id="aom-runs"></option>
        <option value="time"     id="aom-time"></option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label" id="actl-period"></span>
      <select id="act-period" onchange="onActPeriodChange()">
        <option value="week"       id="aop-week"></option>
        <option value="curr_month" id="aop-curr_month"></option>
        <option value="last_month" id="aop-last_month"></option>
        <option value="curr_year"  id="aop-curr_year"></option>
        <option value="last_year"  id="aop-last_year"></option>
        <option value="custom"     id="aop-custom"></option>
      </select>
    </div>
    <div id="act-custom-wrap" class="filter-group" style="display:none">
      <input type="date" id="act-from" onchange="renderActivities()"
        style="border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;padding:5px 10px;outline:none">
      <span style="color:var(--muted);padding:0 4px">–</span>
      <input type="date" id="act-to" onchange="renderActivities()"
        style="border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;padding:5px 10px;outline:none">
    </div>
  </div>

  <div class="chart-card" style="margin-bottom:20px">
    <svg class="chart-svg" id="act-svg" viewBox="0 0 760 160"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
  </div>

  <div id="act-list"></div>
</div>

<script src="data/data.js"></script>
<script src="data/activities.js" onerror="void 0"></script>

let LANG = localStorage.getItem('lang') || 'en';
const t = key => I18N[LANG][key];

function locStr(obj) {
  return (LANG === 'be' && obj.location_be) ? obj.location_be : obj.location;
}

// ── Helpers ───────────────────────────────────────────────────

var BE_MONTHS = [
  'студзеня','лютага','сакавіка','красавіка','траўня','чэрвеня',
  'ліпеня','жніўня','верасня','кастрычніка','лістапада','снежня'
];

var BE_MONTHS_SHORT = [
  'студз','лют','сак','крас','трав','чэрв',
  'ліп','жн','вер','кастр','ліст','снеж'
];

function fmtDate(str) {
  var d = new Date(str + 'T12:00:00');
  if (LANG === 'be') {
    return d.getDate() + ' ' + BE_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
  }
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function calcPace(distance_km, total_time) {
  var parts = total_time.split(':').map(Number);
  var totalSec = parts.length === 3
    ? parts[0] * 3600 + parts[1] * 60 + parts[2]
    : parts[0] * 60 + parts[1];
  var paceSecPerKm = totalSec / distance_km;
  var pm = Math.floor(paceSecPerKm / 60);
  var ps = Math.round(paceSecPerKm % 60);
  if (ps === 60) { pm++; ps = 0; }
  return pm + ':' + (ps < 10 ? '0' + ps : ps);
}

function photoGrid(photos) {
  if (!photos || photos.length === 0)
    return '<p class="no-photos">' + t('no_photos') + '</p>';
  return '<div class="photos-grid">' +
    photos.map(function(src) {
      return '<div class="photo-thumb" onclick="openLb(\'' + src + '\')">' +
               '<img src="' + src + '" alt="" loading="lazy">' +
             '</div>';
    }).join('') +
  '</div>';
}

var pbChartMetric = 'pace';

var pbChartExpanded = true;

function togglePBChart() {

  document.getElementById('pbc-toggle').textContent   = pbChartExpanded ? '▾' : '▸';
}

function setPBChartMetric(m) {
  pbChartMetric = m;
  document.getElementById('pbc-pace').classList.toggle('active', m === 'pace');
  document.getElementById('pbc-time').classList.toggle('active', m === 'time');
  renderPBChart();
}

function buildPBChartOptions() {
  document.getElementById('pbc-label-dist').textContent = t('pbc_distance');
  document.getElementById('pbc-pace').textContent       = t('pbc_pace');
  document.getElementById('pbc-time').textContent       = t('pbc_time');

  var sel    = document.getElementById('pbc-distance');

  }).join('');

    sel.value = curVal;

function timeToSec(str) {
  var p = str.split(':').map(Number);
  return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2] : p[0]*60 + p[1];
}

function fmtSec(sec) {
  sec = Math.round(sec);
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = sec % 60;
  if (h > 0) return h + ':' + (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
  return m + ':' + (s < 10 ? '0'+s : s);
}

function renderPBChart() {
  var svg = document.getElementById('pbc-svg');
  var distName = document.getElementById('pbc-distance').value;
  var pb = PERSONAL_BESTS.find(function(p) { return p.distance === distName; });
  if (!pb) { svg.innerHTML = ''; return; }

  // Collect all data points: previous records + current PB
  var points = (pb.previous_records || []).map(function(r) {
    return { date: r.date, sec: timeToSec(r.time), loc: r.location };
  });
  points.push({ date: pb.date, sec: timeToSec(pb.total_time), loc: pb.location, isBest: true });
  points.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

  if (points.length < 2) {
    // single point — still draw it
    if (points.length === 0) { svg.innerHTML = ''; return; }
  }

  var W = 760, H = 180, ML = 52, MR = 16, MT = 14, MB = 42;
  var cW = W - ML - MR, cH = H - MT - MB;
  var n  = points.length;
  var isPace = pbChartMetric === 'pace';

  function val(pt) {
    return isPace ? pt.sec / pb.distance_km : pt.sec;
  }

  var vals = points.map(val);
  var minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  var pad  = (maxV - minV) * 0.18 || (isPace ? 10 : 30);
  minV = Math.max(0, minV - pad); maxV += pad;
  var range = maxV - minV || 1;

  function xPos(i) { return n === 1 ? ML + cW/2 : ML + (i / (n-1)) * cW; }
  // lower = better → invert: lower value → top of chart
  function yPos(v) { return MT + ((v - minV) / range) * cH; }

  function fmtVal(v) { return fmtSec(v); }

  // y-axis ticks
  var tickCount = 4, yHtml = '';
  for (var ti = 0; ti <= tickCount; ti++) {
    var tv = minV + (ti / tickCount) * range;
    var ty = yPos(tv);
    yHtml +=
      '<line x1="' + ML + '" y1="' + ty + '" x2="' + (ML+cW) + '" y2="' + ty +
        '" stroke="var(--border)" stroke-width="1"/>' +
      '<text x="' + (ML-5) + '" y="' + (ty+4) +
        '" text-anchor="end" font-size="10" font-family="inherit" fill="var(--muted)">' +
        fmtVal(tv) + '</text>';
  }

  // x-axis: label every point with short date
  var xHtml = points.map(function(pt, i) {
    var d    = new Date(pt.date + 'T12:00:00');
    var mon  = LANG === 'be'
      ? BE_MONTHS_SHORT[d.getMonth()]
      : d.toLocaleDateString('en-GB', { month: 'short' });
    var line1 = mon + ' ' + d.getDate();
    var line2 = d.getFullYear();
    var x = xPos(i);
    return '<text x="' + x + '" y="' + (MT+cH+16) +
      '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' + line1 + '</text>' +
      '<text x="' + x + '" y="' + (MT+cH+28) +
      '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' + line2 + '</text>';
  }).join('');

  // trend line
  var lineHtml = n > 1
    ? '<polyline points="' + points.map(function(pt,i){return xPos(i)+','+yPos(val(pt));}).join(' ') +
      '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>'
    : '';

  // dots — current PB gets a larger filled circle
  var dotsHtml = points.map(function(pt, i) {
    var v   = val(pt);
    var tip = fmtDate(pt.date) + ' · ' + pt.loc + '\n' + fmtVal(v) + (isPace ? ' ' + t('min_km') : '');
    var r   = pt.isBest ? 7 : 5;
    var fill = pt.isBest ? 'var(--accent)' : 'var(--card)';
    var stroke = 'var(--accent)';
    var sw = pt.isBest ? 0 : 2.5;
    return '<circle cx="' + xPos(i) + '" cy="' + yPos(v) + '" r="' + r + '"' +
      ' fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + sw + '">' +
      '<title>' + tip.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</title></circle>';
  }).join('');

  svg.innerHTML = yHtml + xHtml + lineHtml + dotsHtml;
}

  document.getElementById('flabel-search').textContent   = t('filter_search');

function applyFilters() {
  var year     = document.getElementById('filter-year').value;
  var distance = document.getElementById('filter-distance').value;
  var search   = document.getElementById('filter-search').value.trim().toLowerCase();

  var filtered = RUNS.filter(function(r) {
    if (year     && r.date.slice(0, 4) !== year)               return false;
    if (distance && r.distance_km !== parseFloat(distance))    return false;
    if (search   && !locStr(r).toLowerCase().includes(search)) return false;
    return true;
  });

  renderRuns(filtered);
  document.getElementById('runs-count').textContent =
    (filtered.length < RUNS.length) ? t('runs_shown')(filtered.length, RUNS.length) : '';
}

function resetFilters() {
  document.getElementById('filter-year').value     = '';
  document.getElementById('filter-distance').value = '';
  document.getElementById('filter-search').value   = '';
  applyFilters();
}

function getActBounds() {
  var period = document.getElementById('act-period').value;
  var now    = new Date();
  var end    = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  var start;
  if (period === 'week') {
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 6);
  } else if (period === 'curr_month') {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
  } else if (period === 'last_month') {
    start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    end   = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
  } else if (period === 'curr_year') {
    start = new Date(now.getFullYear(), 0, 1);
  } else if (period === 'last_year') {
    start = new Date(now.getFullYear() - 1, 0, 1);
    end   = new Date(now.getFullYear() - 1, 11, 31, 23, 59, 59);
  } else {
    var from = document.getElementById('act-from').value;
    var to   = document.getElementById('act-to').value;
    start = from ? new Date(from) : new Date(0);
    end   = to   ? new Date(to + 'T23:59:59') : new Date();
  }
  return { start: start, end: end };
}

function getActFiltered(start, end) {
  var type = document.getElementById('act-type').value;
  return ACTIVITIES.filter(function(a) {
    var d = new Date(a.date + 'T12:00:00');
    if (d < start || d > end) return false;
    if (type !== 'all' && a.type !== type) return false;
    return true;
  });
}

function actTimeToMin(s) {
  var p = s.split(':').map(Number);
  return p.length === 3 ? p[0] * 60 + p[1] + p[2] / 60 : p[0] + p[1] / 60;
}

function fmtActTotalTime(min) {
  var h = Math.floor(min / 60), m = Math.round(min % 60);
  if (h > 0) return h + t('act_h') + (m > 0 ? ' ' + m + t('act_min') : '');
  return m + t('act_min');
}

function getActBucketKey(dateStr, bType) {
  if (bType === 'month') return dateStr.slice(0, 7);
  if (bType === 'day')   return dateStr;
  var d = new Date(dateStr + 'T12:00:00');
  var dow = d.getDay() || 7;
  d.setDate(d.getDate() - (dow - 1));
  return d.toISOString().slice(0, 10);
}

function genActBucketKeys(start, end, bType) {
  var keys = [], cur;
  if (bType === 'day') {
    cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
    while (cur <= end) {
      keys.push(cur.toISOString().slice(0, 10));
      cur.setDate(cur.getDate() + 1);
    }
  } else if (bType === 'month') {
    cur = new Date(start.getFullYear(), start.getMonth(), 1);
    while (cur <= end) {
      keys.push(cur.toISOString().slice(0, 7));
      cur.setMonth(cur.getMonth() + 1);
    }
  } else {
    cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
    var dow = cur.getDay() || 7;
    cur.setDate(cur.getDate() - (dow - 1));
    while (cur <= end) {
      keys.push(cur.toISOString().slice(0, 10));
      cur.setDate(cur.getDate() + 7);
    }
  }
  return keys;
}

function fmtActBucketLabel(key, bType) {
  if (bType === 'month') {
    var d = new Date(key + '-01T12:00:00');
    return LANG === 'be' ? BE_MONTHS_SHORT[d.getMonth()]
                         : d.toLocaleDateString('en-GB', { month: 'short' });
  }
  var d = new Date(key + 'T12:00:00');
  var mon = LANG === 'be' ? BE_MONTHS_SHORT[d.getMonth()]
                          : d.toLocaleDateString('en-GB', { month: 'short' });
  return bType === 'day' ? String(d.getDate()) : mon + ' ' + d.getDate();
}

function renderActChart(acts, bounds) {
  var svg    = document.getElementById('act-svg');
  var metric = document.getElementById('act-metric').value;
  var days   = Math.round((bounds.end - bounds.start) / 86400000);
  var bType  = days <= 31 ? 'day' : days <= 90 ? 'week' : 'month';
  var keys   = genActBucketKeys(bounds.start, bounds.end, bType);

  var map = {};
  keys.forEach(function(k) { map[k] = { n: 0, dist: 0, time: 0 }; });
  acts.forEach(function(a) {
    var k = getActBucketKey(a.date, bType);
    if (map[k]) { map[k].n++; map[k].dist += a.distance_km; map[k].time += actTimeToMin(a.time); }
  });

  var vals = keys.map(function(k) {
    return metric === 'distance' ? map[k].dist
         : metric === 'runs'     ? map[k].n
         : map[k].time / 60;
  });

  var maxV = Math.max.apply(null, vals) || 1;
  var W = 760, H = 160, ML = 46, MR = 12, MT = 10, MB = 30;
  var cW = W - ML - MR, cH = H - MT - MB;
  var n = keys.length;
  var slotW = cW / n;
  var barW  = Math.min(36, Math.max(4, slotW * 0.7));

  var yHtml = '';
  for (var ti = 0; ti <= 3; ti++) {
    var tv = (ti / 3) * maxV;
    var ty = MT + cH - (tv / maxV) * cH;
    var lbl = metric === 'distance' ? tv.toFixed(1)
            : metric === 'runs'     ? Math.round(tv).toString()
            : tv.toFixed(1);
    yHtml += '<line x1="' + ML + '" y1="' + ty + '" x2="' + (ML + cW) + '" y2="' + ty +
             '" stroke="var(--border)" stroke-width="1"/>' +
             '<text x="' + (ML - 5) + '" y="' + (ty + 4) +
             '" text-anchor="end" font-size="10" font-family="inherit" fill="var(--muted)">' + lbl + '</text>';
  }

  var barsHtml = '', xHtml = '';
  var labelEvery = Math.ceil(n / 12);
  keys.forEach(function(k, i) {
    var v  = vals[i];
    var cx = ML + (i + 0.5) * slotW;
    if (v > 0) {
      var bh = (v / maxV) * cH, by = MT + cH - bh;
      var tipVal = metric === 'distance' ? v.toFixed(1) + ' km'
                 : metric === 'runs'     ? v + (v !== 1 ? ' runs' : ' run')
                 : fmtActTotalTime(v * 60);
      barsHtml += '<rect x="' + (cx - barW / 2) + '" y="' + by + '" width="' + barW + '" height="' + bh +
                  '" rx="3" fill="var(--accent)" opacity="0.85">' +
                  '<title>' + fmtActBucketLabel(k, bType) + ': ' + tipVal + '</title></rect>';
    }
    if (i % labelEvery === 0 || i === n - 1) {
      xHtml += '<text x="' + cx + '" y="' + (MT + cH + 16) +
               '" text-anchor="middle" font-size="10" font-family="inherit" fill="var(--muted)">' +
               fmtActBucketLabel(k, bType) + '</text>';
    }
  });

  svg.innerHTML = yHtml + barsHtml + xHtml;
}

function renderActList(acts) {
  var el = document.getElementById('act-list');
  if (acts.length === 0) {
    el.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:32px 0">' +
                   t('act_no_data') + '</p>';
    return;
  }
  var sorted = acts.slice().sort(function(a, b) { return b.datetime.localeCompare(a.datetime); });
  var totalDist = 0, totalMin = 0;
  sorted.forEach(function(a) { totalDist += a.distance_km; totalMin += actTimeToMin(a.time); });

  var summaryHtml =
    '<div class="act-summary">' +
      '<div class="act-sum-item"><span class="act-sum-val">' + sorted.length + '</span>' +
        '<span class="act-sum-lbl">' + t('act_metric_runs') + '</span></div>' +
      '<div class="act-sum-item"><span class="act-sum-val">' + totalDist.toFixed(1) + '</span>' +
        '<span class="act-sum-lbl">' + t('km') + '</span></div>' +
      '<div class="act-sum-item"><span class="act-sum-val">' + fmtActTotalTime(totalMin) + '</span>' +
        '<span class="act-sum-lbl">' + t('total_time') + '</span></div>' +
    '</div>';

  var listHtml = sorted.map(function(a) {
    var pace       = a.distance_km > 0 ? calcPace(a.distance_km, a.time) : '--';
    var elevHtml   = a.elevation > 0
      ? '<div class="act-stat"><span class="act-stat-val">' + a.elevation + '</span>' +
        '<span class="act-stat-lbl">' + t('elevation') + ', ' + t('m') + '</span></div>'
      : '';
    var typeClass  = a.type.toLowerCase().indexOf('trail') !== -1 ? ' trail' : '';
    return '<div class="act-row">' +
      '<div style="min-width:110px;font-size:13px;color:var(--muted);font-weight:600">' + fmtDate(a.date) + '</div>' +
      '<span class="act-type' + typeClass + '">' + a.type + '</span>' +
      '<div class="act-stat"><span class="act-stat-val">' + a.distance_km.toFixed(2) + '</span>' +
        '<span class="act-stat-lbl">' + t('km') + '</span></div>' +
      '<div class="act-stat"><span class="act-stat-val">' + a.time + '</span>' +
        '<span class="act-stat-lbl">' + t('total_time') + '</span></div>' +
      '<div class="act-stat"><span class="act-stat-val">' + pace + '</span>' +
        '<span class="act-stat-lbl">' + t('min_km') + '</span></div>' +
      elevHtml +
    '</div>';
  }).join('');

  el.innerHTML = summaryHtml + listHtml;
}

function renderActivities() {
  var bounds = getActBounds();
  var acts   = getActFiltered(bounds.start, bounds.end);
  renderActChart(acts, bounds);
  renderActList(acts);
}

// ── Language switch ───────────────────────────────────────────

function setLang(lang) {
  LANG = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;

  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-be').classList.toggle('active', lang === 'be');
  document.getElementById('logo').innerHTML      = t('logo');
  document.getElementById('nav-runs').textContent        = t('nav_runs');
  document.getElementById('nav-pbs').textContent         = t('nav_pbs');
  document.getElementById('nav-activities').textContent  = t('nav_activities');

  buildFilterOptions();
  applyFilters();
  buildPBChartOptions();
  renderPBChart();
  renderPBs();
  initActivitiesControls();
  renderActivities();
}

// ── Interactions ──────────────────────────────────────────────

function toggleDetails(i) {
  var det  = document.getElementById('det-'  + i);
  var btn  = document.getElementById('ebtn-' + i);
  var open = det.classList.toggle('open');
  btn.textContent = open ? '▾  ' + t('hide_details') : '▸  ' + t('photos_details');
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('visible'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('visible');
  btn.classList.add('active');
  document.getElementById('runs-filterbar').style.display = name === 'runs' ? ''      : 'none';
  document.getElementById('pbs-chart').style.display      = name === 'pbs'  ? 'block' : 'none';
  if (name === 'activities') { initActivitiesControls(); renderActivities(); }
}

function openLb(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLb(); });

// ── Init ─────────────────────────────────────────────────────
setLang(LANG);
</script>
